<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WB SFE Support Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --wb-navy: #0f2547;
    --wb-blue: #1a56db;
    --wb-sky: #e8f0fd;
    --surface: #ffffff;
    --bg: #f1f5fb;
    --border: #dde4f0;
    --text: #1e293b;
    --muted: #64748b;
  }
  html, body { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); }
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    background: var(--surface);
    box-shadow: 0 0 40px rgba(15, 37, 71, 0.1);
  }
  .header {
    background: var(--wb-navy);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header h1 { font-size: 16px; margin: 0; }
  .header p { font-size: 12px; opacity: 0.8; margin: 2px 0 0 0; }
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { display: flex; gap: 10px; margin-bottom: 10px; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .bot-avatar { background: var(--wb-sky); }
  .user-avatar { background: var(--wb-blue); color: white; }
  .bubble {
    max-width: 70%;
    padding: 12px 14px;
    border-radius: 12px;
    word-break: break-word;
    line-height: 1.5;
  }
  .msg.bot .bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .msg.user .bubble { background: var(--wb-blue); color: white; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 20px; }
  .chip {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .chip:hover { background: var(--wb-sky); border-color: var(--wb-blue); }
  .input-area { border-top: 1px solid var(--border); padding: 12px 20px; display: flex; gap: 10px; }
  textarea { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: inherit; resize: none; max-height: 100px; }
  textarea:focus { outline: none; border-color: var(--wb-blue); }
  button { padding: 10px 20px; background: var(--wb-blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  button:hover { background: var(--wb-navy); }
  button:disabled { background: var(--border); cursor: not-allowed; }
  .footer { padding: 10px; text-align: center; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div>🤖</div>
    <div>
      <h1>WB SFE / CRM Support Bot</h1>
      <p>Walter Bushnell · Field Force Assistant</p>
    </div>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="chips">
    <button class="chip" onclick="addMsg('DCR Issue')">📋 DCR Issue</button>
    <button class="chip" onclick="addMsg('MSL Issue')">🏥 MSL Issue</button>
    <button class="chip" onclick="addMsg('MTP Issue')">📅 MTP Issue</button>
    <button class="chip" onclick="addMsg('STP Issue')">🗺️ STP Issue</button>
    <button class="chip" onclick="addMsg('Expense Issue')">💰 Expense Issue</button>
    <button class="chip" onclick="addMsg('Leave Issue')">🏖️ Leave Issue</button>
    <button class="chip" onclick="addMsg('ESSR Issue')">📊 ESSR Issue</button>
    <button class="chip" onclick="addMsg('Other Issues')">❓ Other Issues</button>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Type your message..." onkeypress="if(event.key=='Enter'&&!event.shiftKey){send();event.preventDefault();}"></textarea>
    <button onclick="send()">Send</button>
  </div>

  <div class="footer">SFE Support Team · Walter Bushnell · sfesupport@walterbushnell.com</div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');

// Simple welcome on load
window.onload = () => {
  showBot('🙏 Namaste! I am your SFE & ESSR Assistant.\n\nPlease tell me your issue and I will help you. You can:\n• Type your problem\n• Click a quick button above\n\nHow can I help?');
};

function showBot(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="avatar bot-avatar">🤖</div><div class="bubble">${text.split('\n').join('<br>')}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showUser(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar user-avatar">👤</div><div class="bubble">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addMsg(text) {
  input.value = text;
  input.focus();
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  showUser(text);

  // Show typing
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg bot';
  typingDiv.innerHTML = `<div class="avatar bot-avatar">🤖</div><div class="bubble" style="padding:8px">Thinking...</div>`;
  chat.appendChild(typingDiv);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer 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' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          {
            role: 'system',
            content: `You are SFE/ESSR support for Walter Bushnell. Help with: DCR unlock, MSL/doctor issues, MTP, STP, expense, leave, ESSR login.
For anything outside this scope, say: "Please email sfesupport@walterevolution.com with details."
Keep replies short and helpful. Use simple language.`
          },
          { role: 'user', content: text }
        ],
        temperature: 0.4,
        max_tokens: 300
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Sorry, could not get a response.';

    typingDiv.remove();
    showBot(reply);
  } catch(err) {
    typingDiv.remove();
    showBot('⚠️ Error: ' + err.message);
  }
}
</script>
</body>
</html>
