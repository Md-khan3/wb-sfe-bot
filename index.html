<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walter Bushnell - SFE Support Bot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --wb-navy: #0f2547;
  --wb-blue: #1a56db;
  --wb-sky: #e8f0fd;
  --surface: #ffffff;
  --bg: #f1f5fb;
  --border: #dde4f0;
  --text: #1e293b;
  --muted: #64748b;
}

html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 900px;
  margin: 0 auto;
  background: var(--surface);
  box-shadow: 0 0 40px rgba(0,0,0,0.1);
}

.header {
  background: linear-gradient(135deg, var(--wb-navy) 0%, var(--wb-blue) 100%);
  color: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-icon { font-size: 28px; }

.header-text h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
.header-text p { font-size: 11px; margin: 2px 0 0 0; opacity: 0.85; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message { display: flex; gap: 10px; margin-bottom: 8px; }
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  font-weight: 600;
}

.avatar.bot { background: var(--wb-sky); }
.avatar.user { background: var(--wb-blue); color: white; }

.bubble {
  max-width: 70%;
  padding: 12px 14px;
  border-radius: 12px;
  word-break: break-word;
  line-height: 1.5;
  font-size: 13px;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.bot .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.message.user .bubble {
  background: var(--wb-blue);
  color: white;
  border-bottom-right-radius: 4px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 20px;
  margin-bottom: 8px;
}

.chip-btn {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: white;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: inherit;
}

.chip-btn:hover {
  background: var(--wb-sky);
  border-color: var(--wb-blue);
  transform: translateY(-2px);
}

.input-section {
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  gap: 8px;
  background: white;
  align-items: flex-end;
}

.input-section textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: inherit;
  font-size: 14px;
  resize: none;
  max-height: 100px;
}

.input-section textarea:focus {
  outline: none;
  border-color: var(--wb-blue);
  box-shadow: 0 0 0 3px var(--wb-sky);
}

.input-icons {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  background: white;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}

.icon-btn:hover { background: var(--wb-sky); border-color: var(--wb-blue); }
.icon-btn.recording { background: #fee2e2; border-color: #dc2626; animation: pulse 1s infinite; }

@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); } 50% { box-shadow: 0 0 0 6px rgba(220,38,38,0); } }

.send-btn {
  width: 36px;
  height: 36px;
  padding: 0;
  background: var(--wb-blue);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.send-btn:hover { background: var(--wb-navy); transform: scale(1.05); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }

.footer {
  padding: 10px;
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  border-top: 1px solid var(--border);
}

.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal-box {
  background: white;
  padding: 40px;
  border-radius: 16px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.modal-box h2 {
  font-size: 22px;
  margin-bottom: 10px;
  color: var(--wb-navy);
}

.modal-box p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
}

.form-field {
  margin-bottom: 18px;
}

.form-field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}

.form-field input, .form-field select {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
}

.form-field input:focus, .form-field select:focus {
  outline: none;
  border-color: var(--wb-blue);
}

.form-error {
  color: #dc2626;
  font-size: 12px;
  margin-top: 4px;
}

.modal-submit {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--wb-blue) 0%, var(--wb-navy) 100%);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  font-family: inherit;
}

.modal-submit:hover { opacity: 0.95; }

#fileInput { display: none; }
</style>
</head>
<body>

<div class="container" id="chatContainer" style="display:none;">
  <div class="header">
    <div class="header-icon">👨‍⚕️</div>
    <div class="header-text">
      <h1>WB SFE / CRM Support Bot</h1>
      <p>Walter Bushnell · Field Force Assistant</p>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chips" id="chips">
    <button class="chip-btn" onclick="quickReply('DCR Issue')">📋 DCR Issue</button>
    <button class="chip-btn" onclick="quickReply('MSL Issue')">👨‍⚕️ MSL Issue</button>
    <button class="chip-btn" onclick="quickReply('MTP Issue')">📅 MTP Issue</button>
    <button class="chip-btn" onclick="quickReply('STP Issue')">🗺️ STP Issue</button>
    <button class="chip-btn" onclick="quickReply('Expense Issue')">💰 Expense Issue</button>
    <button class="chip-btn" onclick="quickReply('Leave Issue')">🏖️ Leave Issue</button>
    <button class="chip-btn" onclick="quickReply('ESSR Issue')">📊 ESSR Issue</button>
    <button class="chip-btn" onclick="quickReply('Other Issues')">❓ Other</button>
  </div>

  <div class="input-section">
    <textarea id="userInput" placeholder="Type or speak your message..."></textarea>
    <div class="input-icons">
      <button class="icon-btn" onclick="startVoiceInput()" id="voiceBtn" title="Speak">🎤</button>
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Attach file">📎</button>
      <button class="icon-btn" id="speakBtn" style="display:none;" onclick="toggleVoiceReply()" title="Hear replies">🔊</button>
    </div>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <div class="footer">
    SFE Support Team · Walter Bushnell · sfesupport@walterbushnell.com
  </div>
</div>

<!-- MODAL FORM -->
<div class="modal-overlay active" id="modal">
  <div class="modal-box">
    <h2>🙏 Welcome to WB SFE Support</h2>
    <p>Please enter your details</p>

    <div class="form-field">
      <label>Email ID</label>
      <input type="email" id="emailInput" placeholder="your.email@walterbushnell.com">
      <div class="form-error" id="emailError"></div>
    </div>

    <div class="form-field">
      <label>Division</label>
      <select id="divisionInput">
        <option value="">-- Select Division --</option>
        <option value="Millennia">Millennia</option>
        <option value="Millennia-ACE">Millennia-ACE</option>
        <option value="Millennia-STAR">Millennia-STAR</option>
        <option value="Enlitia">Enlitia</option>
        <option value="Integra(Nepal)">Integra(Nepal)</option>
      </select>
      <div class="form-error" id="divisionError"></div>
    </div>

    <div class="form-field">
      <label>Headquarters (HQ)</label>
      <input type="text" id="hqInput" placeholder="e.g., Mumbai HQ">
      <div class="form-error" id="hqError"></div>
    </div>

    <button class="modal-submit" onclick="submitForm()">Continue to Chat</button>
  </div>
</div>

<input type="file" id="fileInput" onchange="handleFileUpload(event)">

<script>
let userEmail = '';
let userDivision = '';
let userHQ = '';
let voiceReplyEnabled = false;
let recognition = null;
let isRecording = false;
let attachedFile = null;

// Initialize Speech Recognition
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function submitForm() {
  const email = document.getElementById('emailInput').value.trim();
  const division = document.getElementById('divisionInput').value;
  const hq = document.getElementById('hqInput').value.trim();

  document.getElementById('emailError').textContent = '';
  document.getElementById('divisionError').textContent = '';
  document.getElementById('hqError').textContent = '';

  let valid = true;

  if (!email || !email.includes('@')) {
    document.getElementById('emailError').textContent = 'Please enter a valid email';
    valid = false;
  }

  if (!division) {
    document.getElementById('divisionError').textContent = 'Please select a division';
    valid = false;
  }

  if (!hq) {
    document.getElementById('hqError').textContent = 'Please enter your HQ';
    valid = false;
  }

  if (!valid) return;

  userEmail = email;
  userDivision = division;
  userHQ = hq;

  document.getElementById('modal').classList.remove('active');
  document.getElementById('chatContainer').style.display = 'flex';
  document.getElementById('speakBtn').style.display = 'flex';

  addBotMessage(`✅ Welcome! Your details are saved:\n📧 Email: ${email}\n🏢 Division: ${division}\n📍 HQ: ${hq}\n\nHow can I help you today?`);
}

function quickReply(text) {
  document.getElementById('userInput').value = text;
  document.getElementById('userInput').focus();
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (file) {
    attachedFile = file;
    document.getElementById('userInput').placeholder = `📎 ${file.name}`;
  }
}

function startVoiceInput() {
  if (!SpeechRecognition) {
    addBotMessage('⚠️ Voice input not supported in your browser. Use Chrome or Edge.');
    return;
  }

  if (isRecording) {
    recognition.stop();
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-IN';

  const voiceBtn = document.getElementById('voiceBtn');
  voiceBtn.classList.add('recording');
  voiceBtn.textContent = '⏹️';
  isRecording = true;

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    document.getElementById('userInput').value = transcript;
  };

  recognition.onend = () => {
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '🎤';
    isRecording = false;
  };

  recognition.start();
}

function toggleVoiceReply() {
  voiceReplyEnabled = !voiceReplyEnabled;
  const btn = document.getElementById('speakBtn');
  btn.textContent = voiceReplyEnabled ? '🔊' : '🔇';
  btn.style.opacity = voiceReplyEnabled ? '1' : '0.6';
}

function addBotMessage(text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message bot';
  msgDiv.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  if (voiceReplyEnabled) {
    speakText(text);
  }
}

function addUserMessage(text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message user';
  msgDiv.innerHTML = `
    <div class="avatar user">👤</div>
    <div class="bubble">${text}</div>
  `;
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  
  const utterance = new SpeechSynthesisUtterance(text.replace(/<br>/g, ' '));
  utterance.lang = 'en-IN';
  utterance.rate = 0.9;
  window.speechSynthesis.speak(utterance);
}

async function sendMessage() {
  const text = document.getElementById('userInput').value.trim();
  if (!text) return;

  document.getElementById('userInput').value = '';
  document.getElementById('userInput').placeholder = '📎 Attach file';
  addUserMessage(text + (attachedFile ? ` [File: ${attachedFile.name}]` : ''));
  attachedFile = null;

  const typingDiv = document.createElement('div');
  typingDiv.className = 'message bot';
  typingDiv.id = 'typing-indicator';
  typingDiv.innerHTML = `<div class="avatar bot">🤖</div><div class="bubble" style="padding:8px">Thinking...</div>`;
  document.getElementById('messages').appendChild(typingDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  try {
    const systemPrompt = `You are a multilingual SFE/ESSR support assistant for Walter Bushnell.
User: ${userEmail}, Division: ${userDivision}, HQ: ${userHQ}

IMPORTANT: Detect the language the user writes in and reply ONLY in that language. If they write in Hindi, reply in Hindi. If Marathi, reply in Marathi. If English, reply in English. Match their language.

Help with: DCR unlock (72 hrs, SM approval), MSL/doctor addition, MTP planning, STP routes, Expense claims, Leave (PL min 4 days), ESSR login.

For Red Errors or unknown: "Please email sfesupport@walterevolution.com with screenshot and details."

Keep replies short, helpful, in user's language.`;

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer 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'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: text }
        ],
        temperature: 0.4,
        max_tokens: 350
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || 'Sorry, could not get a response.';

    document.getElementById('typing-indicator').remove();
    addBotMessage(reply);
  } catch (error) {
    document.getElementById('typing-indicator').remove();
    addBotMessage('⚠️ Error: ' + error.message);
  }
}

document.getElementById('emailInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') submitForm();
});

document.getElementById('hqInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') submitForm();
});

document.getElementById('userInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
