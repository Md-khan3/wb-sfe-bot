<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walter Bushnell SFE Support Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #chat-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }
        #chat-header {
            background-color: #0056b3;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }
        #chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #e5ddd5;
        }
        .message {
            max-width: 80%;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.95em;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .bot-message {
            background-color: white;
            align-self: flex-start;
            border-top-left-radius: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .user-message {
            background-color: #dcf8c6;
            align-self: flex-end;
            border-top-right-radius: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        #input-container {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
            border-top: 1px solid #ccc;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 1em;
        }
        #send-btn {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-left: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }
        #send-btn:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Walter Bushnell IT Support</div>
    <div id="chat-box">
        <div class="message bot-message">Hello! Walter Bushnell SFE Support में आपका स्वागत है। आपकी सहायता करने से पहले, कृपया अपनी Email ID, Division, और Headquarters (HQ) शेयर करें।</div>
    </div>
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="processUserInput()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const userInputField = document.getElementById("user-input");

    // Chatbot States
    // 0: Waiting for Email, Division, HQ
    // 1: Authenticated, answering queries
    let chatState = 0; 

    function appendMessage(sender, text) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}-message`;
        msgDiv.innerHTML = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            processUserInput();
        }
    }

    function processUserInput() {
        const userText = userInputField.value.trim();
        if (userText === "") return;

        // Display user message
        appendMessage("user", userText);
        userInputField.value = "";

        // Check state
        if (chatState === 0) {
            // User just provided their credentials
            chatState = 1;
            setTimeout(() => {
                appendMessage("bot", "धन्यवाद! अब कृपया मुझे बताएं कि आप SFE या ESSR में क्या समस्या फेस कर रहे हैं?");
            }, 600);
            return;
        }

        // State 1: Process Support Queries based on SOPs
        setTimeout(() => {
            const response = getBotResponse(userText.toLowerCase());
            appendMessage("bot", response);
        }, 600);
    }

    function getBotResponse(input) {
        const fallbackMsg = "मुझे खेद है, लेकिन यह तकनीकी समस्या/जानकारी मेरे पास उपलब्ध नहीं है। कृपया अपनी समस्या का स्क्रीनशॉट लेकर sfesupport@walterevolution.com पर ईमेल करें (साथ में अपनी Email ID, Division और HQ भी लिखें)। SFE टीम इसे चेक करके आपको जल्द ही रिवर्ट करेगी।<br><br><i>- SFE Support Team, Walter Bushnell</i>";

        // 1. Red Error Catch-All
        if (input.includes("red error") || input.includes("technical issue") || input.includes("server error")) {
            return fallbackMsg;
        }

        // 2. MTP Issues
        if (input.includes("mtp") || input.includes("plan all doctors")) {
            if (input.includes("error") || input.includes("please plan all doctors")) {
                return "अगर आपको 'Please plan all doctors' का error आ रहा है, तो इसका मतलब है कि आपने अपनी MSL (Customer List) के सभी डॉक्टर्स को MTP में ऐड नहीं किया है। कृपया अपनी डॉक्टर लिस्ट क्रॉस-चेक करें और सुनिश्चित करें कि 100% डॉक्टर्स MTP में planned हैं। तभी 'Send for Approval' काम करेगा।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
            }
            if (input.includes("deviation")) {
                return "MTP Deviation (View Tab -> Submit MTP Deviation) केवल Present या Future dates के लिए मान्य है। ध्यान दें, Present date के लिए इसे 3:00 PM या 4:00 PM से पहले सबमिट करना अनिवार्य है।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
            }
            return "MTP (Monthly Tour Plan) 'Submit Tab' से बनता है। Daily requirement 10-12 Doctors और 6 Chemists की है। MTP का final approval आपके SM द्वारा किया जाता है।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
        }

        // 3. DCR Unlock
        if (input.includes("dcr") || input.includes("unlock")) {
            return "DCR को 48 घंटे के अंदर भरना अनिवार्य है, अन्यथा यह लॉक हो जाता है।<br><b>Unlock Process:</b><br>1. आपके पास लॉक होने के समय से 72 घंटे का समय है। (Submit Tab -> DCR Unlock Request).<br>2. अपने Sales Manager (SM) को approval के लिए ईमेल करें।<br>3. SM वह अप्रूवल SFE Support को फॉरवर्ड करेंगे, और हम उसे अनलॉक कर देंगे।<br><br>⚠️ <b>ध्यान दें:</b> यदि आपने अपना 'First Fortnight Expense' सबमिट कर दिया है, तो DCR Unlock request सिस्टम द्वारा reject कर दी जाएगी।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
        }

        // 4. Expense Issues
        if (input.includes("expense") || input.includes("stp as per this station")) {
            if (input.includes("error") || input.includes("stp")) {
                return "अगर आपको 'Please create new STP as per this station' का error आ रहा है, तो इसका मतलब है कि DCR में डाले गए places आपके planned STP से मैच नहीं कर रहे हैं।<br><b>Resolution:</b> कृपया एक नया STP क्रिएट करें जो DCR में भरे गए places से बिल्कुल मैच करता हो।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
            }
            return "Expense महीने में दो बार सबमिट होता है: 1st Fortnight (1st-15th) और 2nd Fortnight (16th-31st)। Expense का 'Print' ऑप्शन तभी दिखेगा जब आपके SM उसे approve कर देंगे।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
        }

        // 5. Doctor / MSL Addition
        if (input.includes("doctor") || input.includes("msl") || input.includes("chemist")) {
            if (input.includes("suggest add doctor") || input.includes("limit") || input.includes("missing") || input.includes("add")) {
                return "अगर आपको कोई डॉक्टर नहीं दिख रहा है, तो पहले spelling चेक करें। Doctor Add/Delete करने के लिए: Master Tab -> MSL Management -> Select Details -> Click 'MSL List Update Add View'।<br><br>यदि 'Suggest Add Doctor' बटन नहीं दिख रहा है, तो आपकी limit पूरी हो चुकी है। Limit बढ़वाने के लिए कृपया SFE Support को ईमेल करें (SM approval के साथ)।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
            }
        }

        // 6. Login & iOS
        if (input.includes("login") || input.includes("ios") || input.includes("apple") || input.includes("iphone") || input.includes("app")) {
            return "<b>Android Users:</b> SFE website homepage से डायरेक्ट APK फाइल डाउनलोड करें।<br><b>iOS (Apple) Users:</b> Safari ब्राउज़र खोलें, कंपनी द्वारा दिया गया स्पेशल 'default' SFE लिंक पेस्ट करें, और Username और Password दोनों में अपना Employee Code दर्ज करें।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
        }

        // 7. ESSR System
        if (input.includes("essr") || input.includes("sales data") || input.includes("password")) {
            return "ESSR एक View-Only सिस्टम है जहाँ आप लाइव SAP सेल्स डेटा (Primary, Secondary, Stock Days) देख सकते हैं।<br>यदि आप पासवर्ड भूल गए हैं या आपका डेटा नहीं दिख रहा है, तो कृपया अपनी Email, Division, HQ और स्क्रीनशॉट के साथ sfesupport@walterevolution.com पर ईमेल करें। आप खुद भी स्क्रीन पर 'Change Password' ऑप्शन इस्तेमाल कर सकते हैं।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
        }

        // 8. Leaves
        if (input.includes("leave") || input.includes("pl")) {
            return "PL (Privilege Leave) कम से कम 4 दिन की होनी चाहिए और इसे 15 दिन पहले अप्लाई करना अनिवार्य है। Leave का final approval CDBO द्वारा होता है।<br><br><i>- SFE Support Team, Walter Bushnell</i>";
        }

        // Default / Unrecognized Query
        return fallbackMsg;
    }
</script>

</body>
</html>
