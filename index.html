<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB SFE Support Bot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --wb-navy: #0f2547;
  --wb-blue: #1a56db;
  --wb-sky: #e8f0fd;
  --surface: #ffffff;
  --bg: #f1f5fb;
  --border: #dde4f0;
  --text: #1e293b;
  --muted: #64748b;
}
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 900px;
  margin: 0 auto;
  background: var(--surface);
  box-shadow: 0 0 40px rgba(0,0,0,0.1);
}

.header {
  background: var(--wb-navy);
  color: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-icon { font-size: 24px; }

.header-text h1 { font-size: 16px; margin: 0; font-weight: 600; }
.header-text p { font-size: 12px; margin: 2px 0 0 0; opacity: 0.8; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message { display: flex; gap: 10px; margin-bottom: 8px; }
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.avatar.bot { background: var(--wb-sky); }
.avatar.user { background: var(--wb-blue); color: white; }

.bubble {
  max-width: 70%;
  padding: 12px 14px;
  border-radius: 12px;
  word-break: break-word;
  line-height: 1.5;
  font-size: 13px;
}

.message.bot .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}

.message.user .bubble {
  background: var(--wb-blue);
  color: white;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 20px;
  margin-bottom: 8px;
}

.chip-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: white;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  font-family: inherit;
}

.chip-btn:hover {
  background: var(--wb-sky);
  border-color: var(--wb-blue);
}

.input-section {
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  gap: 10px;
}

.input-section textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: inherit;
  font-size: 14px;
  resize: none;
  max-height: 100px;
}

.input-section textarea:focus {
  outline: none;
  border-color: var(--wb-blue);
}

.send-btn {
  padding: 10px 20px;
  background: var(--wb-blue);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  font-family: inherit;
}

.send-btn:hover { background: var(--wb-navy); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }

.footer {
  padding: 10px;
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  border-top: 1px solid var(--border);
}

/* MODAL STYLES */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

.modal-overlay.active { display: flex; }

.modal-box {
  background: white;
  padding: 40px;
  border-radius: 12px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
}

.modal-box h2 {
  font-size: 20px;
  margin-bottom: 10px;
  color: var(--wb-navy);
}

.modal-box p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
}

.form-field {
  margin-bottom: 18px;
}

.form-field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
}

.form-field input,
.form-field select {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
}

.form-field input:focus,
.form-field select:focus {
  outline: none;
  border-color: var(--wb-blue);
}

.form-error {
  color: #dc2626;
  font-size: 12px;
  margin-top: 4px;
}

.modal-submit {
  width: 100%;
  padding: 12px;
  background: var(--wb-blue);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  font-family: inherit;
}

.modal-submit:hover { background: var(--wb-navy); }
</style>
</head>
<body>

<div class="container" id="chat-container" style="display:none;">
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>WB SFE / CRM Support Bot</h1>
      <p>Walter Bushnell · Field Force Assistant</p>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chips" id="chips">
    <button class="chip-btn" onclick="quickReply('DCR Issue')">📋 DCR Issue</button>
    <button class="chip-btn" onclick="quickReply('MSL Issue')">🏥 MSL Issue</button>
    <button class="chip-btn" onclick="quickReply('MTP Issue')">📅 MTP Issue</button>
    <button class="chip-btn" onclick="quickReply('STP Issue')">🗺️ STP Issue</button>
    <button class="chip-btn" onclick="quickReply('Expense Issue')">💰 Expense Issue</button>
    <button class="chip-btn" onclick="quickReply('Leave Issue')">🏖️ Leave Issue</button>
    <button class="chip-btn" onclick="quickReply('ESSR Issue')">📊 ESSR Issue</button>
    <button class="chip-btn" onclick="quickReply('Other Issues')">❓ Other Issues</button>
  </div>

  <div class="input-section">
    <textarea id="userInput" placeholder="Type your message..." onkeypress="if(event.key=='Enter'&&!event.shiftKey){sendMessage();event.preventDefault();}"></textarea>
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <div class="footer">
    SFE Support Team · Walter Bushnell · sfesupport@walterbushnell.com
  </div>
</div>

<!-- MODAL FORM -->
<div class="modal-overlay active" id="modal">
  <div class="modal-box">
    <h2>🙏 Welcome to WB SFE Support</h2>
    <p>Please enter your details to get started</p>

    <div class="form-field">
      <label>Email ID</label>
      <input type="email" id="emailInput" placeholder="your.email@walterbushnell.com">
      <div class="form-error" id="emailError"></div>
    </div>

    <div class="form-field">
      <label>Division</label>
      <select id="divisionInput">
        <option value="">-- Select Division --</option>
        <option value="IT Division">IT Division</option>
        <option value="Sales Division">Sales Division</option>
        <option value="Marketing Division">Marketing Division</option>
        <option value="Operations Division">Operations Division</option>
        <option value="Finance Division">Finance Division</option>
        <option value="HR Division">HR Division</option>
        <option value="Other">Other</option>
      </select>
      <div class="form-error" id="divisionError"></div>
    </div>

    <div class="form-field">
      <label>Headquarters (HQ)</label>
      <input type="text" id="hqInput" placeholder="e.g., Mumbai HQ">
      <div class="form-error" id="hqError"></div>
    </div>

    <button class="modal-submit" onclick="submitForm()">Continue to Chat</button>
  </div>
</div>

<script>
let userEmail = '';
let userDivision = '';
let userHQ = '';

function submitForm() {
  const email = document.getElementById('emailInput').value.trim();
  const division = document.getElementById('divisionInput').value;
  const hq = document.getElementById('hqInput').value.trim();

  document.getElementById('emailError').textContent = '';
  document.getElementById('divisionError').textContent = '';
  document.getElementById('hqError').textContent = '';

  let valid = true;

  if (!email || !email.includes('@')) {
    document.getElementById('emailError').textContent = 'Please enter a valid email';
    valid = false;
  }

  if (!division) {
    document.getElementById('divisionError').textContent = 'Please select a division';
    valid = false;
  }

  if (!hq) {
    document.getElementById('hqError').textContent = 'Please enter your HQ';
    valid = false;
  }

  if (!valid) return;

  userEmail = email;
  userDivision = division;
  userHQ = hq;

  document.getElementById('modal').classList.remove('active');
  document.getElementById('chat-container').style.display = 'flex';

  addBotMessage(`✅ Great! Your details are saved:\n📧 Email: ${email}\n🏢 Division: ${division}\n📍 HQ: ${hq}\n\nNow, how can I help you today?`);
}

function quickReply(text) {
  document.getElementById('userInput').value = text;
  document.getElementById('userInput').focus();
}

function addBotMessage(text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message bot';
  msgDiv.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function addUserMessage(text) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message user';
  msgDiv.innerHTML = `
    <div class="avatar user">👤</div>
    <div class="bubble">${text}</div>
  `;
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

async function sendMessage() {
  const text = document.getElementById('userInput').value.trim();
  if (!text) return;

  document.getElementById('userInput').value = '';
  addUserMessage(text);

  const typingDiv = document.createElement('div');
  typingDiv.className = 'message bot';
  typingDiv.id = 'typing-indicator';
  typingDiv.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="bubble" style="padding:8px">Thinking...</div>
  `;
  document.getElementById('messages').appendChild(typingDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  try {
    const systemPrompt = `You are SFE/ESSR support for Walter Bushnell. 
User: ${userEmail}, Division: ${userDivision}, HQ: ${userHQ}

Help with: DCR unlock (within 72 hrs, need SM approval), MSL/doctor addition, MTP planning, STP routes, Expense claims (1st & 2nd fortnight), Leave (PL min 4 days), ESSR login/data issues.

For Red Errors or unknown issues: "Please email sfesupport@walterevolution.com with screenshot and details."

Keep replies short, helpful, use Hinglish when possible.`;

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer 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'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: text }
        ],
        temperature: 0.4,
        max_tokens: 350
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || 'Sorry, could not get a response.';

    document.getElementById('typing-indicator').remove();
    addBotMessage(reply);
  } catch (error) {
    document.getElementById('typing-indicator').remove();
    addBotMessage('⚠️ Error: ' + error.message);
  }
}

document.getElementById('emailInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') submitForm();
});

document.getElementById('hqInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') submitForm();
});
</script>

</body>
</html>
